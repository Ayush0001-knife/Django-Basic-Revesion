{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <title>Blogs</title>

      <style>
            body {
                  font-family: Arial, sans-serif;
                  margin: 0;
                  padding: 40px;
                  background: linear-gradient(120deg, #667eea, #764ba2);
            }

            h1 {
                  text-align: center;
                  color: white;
                  margin-bottom: 40px;
            }

            .container {
                  display: grid;
                  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                  gap: 25px;
                  max-width: 1200px;
                  margin: auto;
            }

            .card {
                  background: white;
                  border-radius: 10px;
                  overflow: hidden;
                  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
                  transition: 0.3s;
            }

            .card:hover {
                  transform: translateY(-6px);
            }

            .card img {
                  width: 100%;
                  height: 200px;
                  object-fit: cover;
            }

            .card-content {
                  padding: 20px;
            }

            .title {
                  font-size: 22px;
                  font-weight: bold;
                  margin-bottom: 10px;
            }

            .meta {
                  font-size: 14px;
                  color: #777;
                  margin-bottom: 15px;
            }

            .description {
                  font-size: 15px;
                  color: #444;
                  margin-bottom: 20px;
            }

            .read-btn {
                  display: inline-block;
                  padding: 10px 18px;
                  background: #667eea;
                  color: white;
                  text-decoration: none;
                  border-radius: 5px;
                  font-size: 14px;
            }

            .read-btn:hover {
                  background: #5563d6;
            }
      </style>

</head>

<body>

      <h1>Blog Posts</h1>

      <div class="container">

            {% for blog in blogs %}

            <div class="card">

                  <img src="{{ blog.blog_image.url }}" alt="blog image">

                  <div class="card-content">

                        <div class="title">{{ blog.title }}</div>

                        <div class="meta">
                              Category: {{ blog.category.category_name }} <br>
                              Author: {{ blog.author.username }} <br>
                              Posted: {{ blog.created_at|date:"M d, Y" }}
                        </div>

                        <div class="description">
                              {{ blog.short_description }}
                        </div>

                        <a href="#" class="read-btn">Read Blog</a>

                  </div>

            </div>

            {% empty %}

            <p style="color:white;text-align:center;">No blogs available</p>

            {% endfor %}

      </div>

</body>

</html>
